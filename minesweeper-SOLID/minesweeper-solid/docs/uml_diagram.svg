<svg width="900" height="780" viewBox="0 0 900 780" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="hollow-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M1 1L9 5L1 9Z" fill="white" stroke="#555" stroke-width="1.2" stroke-linejoin="round"/>
    </marker>
    <marker id="diamond" viewBox="0 0 14 8" refX="1" refY="4" markerWidth="12" markerHeight="8" orient="auto">
      <polygon points="7,1 13,4 7,7 1,4" fill="#555" stroke="#555" stroke-width="0.5"/>
    </marker>
    <marker id="dashed-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="780" fill="#FAFAFA" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="16" font-weight="600" fill="#1a1a2e">Minesweeper SOLID — UML Class Diagram</text>
  <line x1="60" y1="48" x2="840" y2="48" stroke="#ddd" stroke-width="1"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- main.cpp                                           -->
  <!-- ═══════════════════════════════════════════════════ -->
  <g id="main">
    <!-- shadow -->
    <rect x="63" y="73" width="214" height="202" rx="9" fill="#00000010"/>
    <!-- card -->
    <rect x="60" y="70" width="214" height="202" rx="9" fill="white" stroke="#0F6E56" stroke-width="1.5"/>
    <!-- header -->
    <rect x="60" y="70" width="214" height="42" rx="9" fill="#1D9E75"/>
    <rect x="60" y="97" width="214" height="15" fill="#1D9E75"/>
    <text x="167" y="86" text-anchor="middle" font-size="10" fill="#9FE1CB" font-style="italic">«entry point»</text>
    <text x="167" y="102" text-anchor="middle" font-size="13" font-weight="600" fill="white">main.cpp</text>
    <!-- divider -->
    <line x1="60" y1="112" x2="274" y2="112" stroke="#0F6E56" stroke-width="1"/>
    <!-- fields label -->
    <text x="72" y="128" font-size="10" fill="#0F6E56" font-weight="600" letter-spacing="0.5">FIELDS</text>
    <line x1="60" y1="135" x2="274" y2="135" stroke="#e8e8e8" stroke-width="0.8"/>
    <text x="72" y="150" font-size="11" fill="#333">– game : Game</text>
    <!-- divider -->
    <line x1="60" y1="162" x2="274" y2="162" stroke="#0F6E56" stroke-width="1"/>
    <!-- methods label -->
    <text x="72" y="176" font-size="10" fill="#0F6E56" font-weight="600" letter-spacing="0.5">METHODS</text>
    <line x1="60" y1="183" x2="274" y2="183" stroke="#e8e8e8" stroke-width="0.8"/>
    <text x="72" y="198" font-size="11" fill="#333">+ main() : int</text>
    <text x="72" y="215" font-size="11" fill="#333">– initWindow() : void</text>
    <text x="72" y="232" font-size="11" fill="#333">– drawBoard() : void</text>
    <text x="72" y="249" font-size="11" fill="#333">– drawOverlay() : void</text>
    <text x="72" y="266" font-size="11" fill="#333">+ getBoard() : Board&amp;</text>
  </g>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Game                                               -->
  <!-- ═══════════════════════════════════════════════════ -->
  <g id="game">
    <rect x="63" y="333" width="214" height="262" rx="9" fill="#00000010"/>
    <rect x="60" y="330" width="214" height="262" rx="9" fill="white" stroke="#3C3489" stroke-width="1.5"/>
    <rect x="60" y="330" width="214" height="42" rx="9" fill="#534AB7"/>
    <rect x="60" y="357" width="214" height="15" fill="#534AB7"/>
    <text x="167" y="346" text-anchor="middle" font-size="10" fill="#CECBF6" font-style="italic">«state + audio»</text>
    <text x="167" y="362" text-anchor="middle" font-size="13" font-weight="600" fill="white">Game</text>
    <line x1="60" y1="372" x2="274" y2="372" stroke="#3C3489" stroke-width="1"/>
    <text x="72" y="388" font-size="10" fill="#3C3489" font-weight="600" letter-spacing="0.5">FIELDS</text>
    <line x1="60" y1="395" x2="274" y2="395" stroke="#e8e8e8" stroke-width="0.8"/>
    <text x="72" y="410" font-size="11" fill="#333">– board : Board</text>
    <text x="72" y="427" font-size="11" fill="#333">– gameOver : bool</text>
    <text x="72" y="444" font-size="11" fill="#333">– won : bool</text>
    <text x="72" y="461" font-size="11" fill="#333">– sounds : Sound[ ]</text>
    <line x1="60" y1="473" x2="274" y2="473" stroke="#3C3489" stroke-width="1"/>
    <text x="72" y="487" font-size="10" fill="#3C3489" font-weight="600" letter-spacing="0.5">METHODS</text>
    <line x1="60" y1="494" x2="274" y2="494" stroke="#e8e8e8" stroke-width="0.8"/>
    <text x="72" y="509" font-size="11" fill="#333">+ handleInput() : void</text>
    <text x="72" y="526" font-size="11" fill="#333">+ update() : void</text>
    <text x="72" y="543" font-size="11" fill="#333">+ isWon() : bool</text>
    <text x="72" y="560" font-size="11" fill="#333">+ isOver() : bool</text>
    <text x="72" y="577" font-size="11" fill="#333">– playSound(e) : void</text>
  </g>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Board                                              -->
  <!-- ═══════════════════════════════════════════════════ -->
  <g id="board">
    <rect x="563" y="333" width="274" height="322" rx="9" fill="#00000010"/>
    <rect x="560" y="330" width="274" height="322" rx="9" fill="white" stroke="#993C1D" stroke-width="1.5"/>
    <rect x="560" y="330" width="274" height="42" rx="9" fill="#D85A30"/>
    <rect x="560" y="357" width="274" height="15" fill="#D85A30"/>
    <text x="697" y="346" text-anchor="middle" font-size="10" fill="#F5C4B3" font-style="italic">«grid + logic»</text>
    <text x="697" y="362" text-anchor="middle" font-size="13" font-weight="600" fill="white">Board</text>
    <line x1="560" y1="372" x2="834" y2="372" stroke="#993C1D" stroke-width="1"/>
    <text x="572" y="388" font-size="10" fill="#993C1D" font-weight="600" letter-spacing="0.5">FIELDS</text>
    <line x1="560" y1="395" x2="834" y2="395" stroke="#e8e8e8" stroke-width="0.8"/>
    <text x="572" y="410" font-size="11" fill="#333">– grid : Cell[TOTAL_ROWS][TOTAL_COLS]</text>
    <text x="572" y="427" font-size="11" fill="#333">– onSound : SoundCallback</text>
    <text x="572" y="444" font-size="11" fill="#777" font-style="italic">  {constexpr TOTAL_ROWS, TOTAL_COLS, TOTAL_MINES}</text>
    <line x1="560" y1="456" x2="834" y2="456" stroke="#993C1D" stroke-width="1"/>
    <text x="572" y="470" font-size="10" fill="#993C1D" font-weight="600" letter-spacing="0.5">METHODS</text>
    <line x1="560" y1="477" x2="834" y2="477" stroke="#e8e8e8" stroke-width="0.8"/>
    <text x="572" y="492" font-size="11" fill="#333">+ initialize() : void</text>
    <text x="572" y="509" font-size="11" fill="#333">+ revealCell(row, col) : void</text>
    <text x="572" y="526" font-size="11" fill="#333">+ toggleFlag(row, col) : void</text>
    <text x="572" y="543" font-size="11" fill="#333">+ isMine(row, col) : bool</text>
    <text x="572" y="560" font-size="11" fill="#333">+ isRevealed(row, col) : bool</text>
    <text x="572" y="577" font-size="11" fill="#333">+ isFlagged(row, col) : bool</text>
    <text x="572" y="594" font-size="11" fill="#333">+ setSoundCallback(cb) : void</text>
    <text x="572" y="611" font-size="11" fill="#777">– floodFill(row, col) : void</text>
    <text x="572" y="628" font-size="11" fill="#777">– placeMines() : void</text>
    <text x="572" y="645" font-size="11" fill="#777">– calcAdjacency() : void</text>
  </g>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- SoundCallback                                      -->
  <!-- ═══════════════════════════════════════════════════ -->
  <g id="soundcb">
    <rect x="563" y="73" width="274" height="98" rx="9" fill="#00000010"/>
    <rect x="560" y="70" width="274" height="98" rx="9" fill="white" stroke="#854F0B" stroke-width="1.5"/>
    <rect x="560" y="70" width="274" height="42" rx="9" fill="#BA7517"/>
    <rect x="560" y="97" width="274" height="15" fill="#BA7517"/>
    <text x="697" y="86" text-anchor="middle" font-size="10" fill="#FAC775" font-style="italic">«interface / callback»</text>
    <text x="697" y="102" text-anchor="middle" font-size="13" font-weight="600" fill="white">SoundCallback</text>
    <line x1="560" y1="112" x2="834" y2="112" stroke="#854F0B" stroke-width="1"/>
    <text x="572" y="132" font-size="11" fill="#333">using SoundCallback =</text>
    <text x="572" y="150" font-size="11" fill="#333">  std::function&lt;void(SoundEvent)&gt;</text>
  </g>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- SoundEvent                                         -->
  <!-- ═══════════════════════════════════════════════════ -->
  <g id="soundevent">
    <rect x="563" y="193" width="274" height="108" rx="9" fill="#00000010"/>
    <rect x="560" y="190" width="274" height="108" rx="9" fill="white" stroke="#854F0B" stroke-width="1.5"/>
    <rect x="560" y="190" width="274" height="42" rx="9" fill="#EF9F27"/>
    <rect x="560" y="217" width="274" height="15" fill="#EF9F27"/>
    <text x="697" y="206" text-anchor="middle" font-size="10" fill="#633806" font-style="italic">«enum class»</text>
    <text x="697" y="222" text-anchor="middle" font-size="13" font-weight="600" fill="white">SoundEvent</text>
    <line x1="560" y1="232" x2="834" y2="232" stroke="#854F0B" stroke-width="1"/>
    <text x="572" y="252" font-size="11" fill="#333">CellRevealed</text>
    <text x="572" y="269" font-size="11" fill="#333">MineHit</text>
    <text x="572" y="286" font-size="11" fill="#333">FlagPlaced  |  FlagRemoved</text>
  </g>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- RELATIONSHIPS                                      -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- main uses Game (dashed dependency) — down -->
  <line x1="167" y1="272" x2="167" y2="320" stroke="#888" stroke-width="1.2" stroke-dasharray="6 4" marker-end="url(#dashed-arrow)"/>
  <rect x="175" y="285" width="52" height="16" rx="3" fill="#f5f5f5"/>
  <text x="201" y="297" text-anchor="middle" font-size="10" fill="#555">«uses»</text>

  <!-- Game composition to Board (diamond at Game, hollow arrow at Board) -->
  <line x1="274" y1="461" x2="550" y2="461" stroke="#555" stroke-width="1.4" marker-start="url(#diamond)" marker-end="url(#hollow-arrow)"/>
  <rect x="345" y="440" width="60" height="16" rx="3" fill="#f5f5f5"/>
  <text x="375" y="452" text-anchor="middle" font-size="10" fill="#555">«owns» 1</text>

  <!-- Game registers callback with Board (dashed) -->
  <path d="M 274 543 C 400 543, 400 594, 550 594" stroke="#888" stroke-width="1.2" stroke-dasharray="6 4" fill="none" marker-end="url(#dashed-arrow)"/>
  <rect x="330" y="560" width="100" height="28" rx="3" fill="#f5f5f5"/>
  <text x="380" y="573" text-anchor="middle" font-size="10" fill="#555">«registers»</text>
  <text x="380" y="583" text-anchor="middle" font-size="10" fill="#555">callback</text>

  <!-- Board uses SoundEvent (dashed, up) -->
  <line x1="697" y1="330" x2="697" y2="298" stroke="#888" stroke-width="1.2" stroke-dasharray="6 4" marker-end="url(#dashed-arrow)"/>
  <rect x="705" y="308" width="42" height="16" rx="3" fill="#f5f5f5"/>
  <text x="726" y="320" text-anchor="middle" font-size="10" fill="#555">«uses»</text>

  <!-- SoundCallback to SoundEvent (solid association) -->
  <line x1="697" y1="168" x2="697" y2="180" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- main reads Board via getBoard() — horizontal top -->
  <line x1="274" y1="115" x2="550" y2="115" stroke="#888" stroke-width="1.2" stroke-dasharray="6 4" marker-end="url(#dashed-arrow)"/>
  <rect x="320" y="98" width="110" height="16" rx="3" fill="#f5f5f5"/>
  <text x="375" y="110" text-anchor="middle" font-size="10" fill="#555">reads via getBoard()</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- LEGEND                                             -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="60" y="690" width="780" height="72" rx="8" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="80" y="710" font-size="10" fill="#555" font-weight="600" letter-spacing="0.5">LEGEND</text>

  <!-- composition -->
  <line x1="80" y1="732" x2="160" y2="732" stroke="#555" stroke-width="1.4" marker-start="url(#diamond)" marker-end="url(#hollow-arrow)"/>
  <text x="168" y="736" font-size="10" fill="#333">Composition (owns)</text>

  <!-- dependency dashed -->
  <line x1="305" y1="732" x2="375" y2="732" stroke="#888" stroke-width="1.2" stroke-dasharray="6 4" marker-end="url(#dashed-arrow)"/>
  <text x="383" y="736" font-size="10" fill="#333">Dependency / uses</text>

  <!-- solid association -->
  <line x1="520" y1="732" x2="590" y2="732" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="598" y="736" font-size="10" fill="#333">Association</text>

  <text x="80" y="752" font-size="10" fill="#888">  –  private field/method     +  public field/method     «…»  stereotype     { }  constraint note</text>

</svg>
